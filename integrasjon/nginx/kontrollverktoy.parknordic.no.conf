# Park Nordic – nginx for kontrollverktoy.parknordic.no
# Referansekonfig for felles auth + sikkerhetsbaseline. MERGES inn i den faktiske
# server-blokka (ikke kopier blindt – behold Let's Encrypt-inkluderingen).
#
# Lukker SIKKERHETSGJENNOMGANG #7 (headere, server_tokens) og #9 (TLS), og kobler
# Datakvalitet på felles auth via auth_request (steg 5 / INSTALL_datakvalitet.md).

# ── i http-blokka (nginx.conf) ────────────────────────────────────────────────
#   server_tokens off;                       # #7: ikke lekk nginx-versjon
#   ssl_protocols TLSv1.2 TLSv1.3;           # #9: dropp TLSv1/1.1 globalt
#   # samkjør opplastingsgrenser (#12): nginx 25M ↔ Node 25MB ↔ MAX_PDF_SIZE_MB=20
#   client_max_body_size 25m;

upstream pn_auth     { server 127.0.0.1:8081; }   # pn-auth (felles auth)
upstream pn_oppdrag  { server 127.0.0.1:3000; }   # Node/Express
upstream pn_sanksjon { server 127.0.0.1:8000; }   # FastAPI (root_path=/sanksjon)

server {
    listen 443 ssl http2;
    server_name kontrollverktoy.parknordic.no;

    # include /etc/letsencrypt/options-ssl-nginx.conf;   # behold eksisterende
    # ssl_certificate ... ; ssl_certificate_key ... ;     # behold eksisterende

    # ── Sikkerhetsheadere (#7). `always` så de også settes på feilsvar. ──────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Felles auth-API: /auth/* → pn-auth ──────────────────────────────────────
    # proxy_pass UTEN trailing slash → hele /auth-stien bevares (pn-auth matcher /auth/...).
    location /auth/ {
        proxy_pass http://pn_auth;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # rate-limit per ekte IP
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Oppdrag (Node). PWA/service worker på roten håndteres av portalen under. ──
    location /oppdrag/ {
        proxy_pass http://pn_oppdrag;          # uten trailing slash – bevar /oppdrag/-prefiks
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ── Sanksjon (FastAPI). root_path="/sanksjon"; proxy_pass UTEN trailing slash. ─
    location /sanksjon/ {
        proxy_pass http://pn_sanksjon;         # med slash → 404 på statiske filer (BYGGESTANDARD §2)
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # ── Datakvalitet (statisk) – sikret med felles auth via auth_request ─────────
    # AI-chat-relay (server-side Anthropic-kall). FastAPI på 127.0.0.1:8082, root_path
    # /datakvalitet. proxy_pass UTEN trailing slash (jf. BYGGESTANDARD §2). Bak samme auth.
    location /datakvalitet/api/ {
        auth_request /_pn_auth_dk;
        error_page 401 403 = @til_login;
        proxy_pass http://127.0.0.1:8082;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }
    location /datakvalitet/ {
        auth_request /_pn_auth_dk;
        error_page 401 403 = @til_login;       # uinnlogget/uten tilgang → portalen
        alias /var/www/parknordic-datakvalitet/;
        index index.html;
        try_files $uri $uri/ /datakvalitet/index.html;
    }
    location = /_pn_auth_dk {
        internal;
        # pn-auth /auth/verify svarer 200/401 basert på gyldig token + permissions.datakvalitet
        proxy_pass http://pn_auth/auth/verify?system=datakvalitet;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Cookie $http_cookie;
    }
    location @til_login { return 302 /; }       # felles innlogging ligger i portalen

    # ── Portal (statisk). Service worker / PWA-rot skal IKKE overskrives. ────────
    location / {
        root /var/www/parknordic-portal;
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    server_name kontrollverktoy.parknordic.no;
    return 301 https://$host$request_uri;
}
